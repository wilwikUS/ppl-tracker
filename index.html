<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0efe8;
    --muted: #7a7a82;
    --push: #e8a87c;
    --pull: #7cc4e8;
    --legs: #a87ce8;
    --accent: #e8d87c;
    --font-head: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; min-height: 100vh; }
  header { padding: 2rem 2.5rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .logo { font-family: var(--font-head); font-size: 13px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  .logo span { color: var(--text); }
  .refresh-btn { font-family: var(--font-head); font-size: 11px; letter-spacing: 0.08em; color: var(--muted); background: none; border: 1px solid var(--border2); padding: 6px 14px; border-radius: 4px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .refresh-btn:hover { color: var(--text); border-color: var(--text); }
  .last-sync { font-size: 11px; color: var(--muted); font-family: var(--font-head); }
  .main { padding: 2rem 2.5rem; max-width: 1400px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
  .metric { background: var(--surface); padding: 1.25rem 1.5rem; }
  .metric-label { font-family: var(--font-head); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
  .metric-value { font-size: 28px; font-weight: 300; letter-spacing: -0.02em; color: var(--text); line-height: 1; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
  @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } .main { padding: 1rem; } header { padding: 1.25rem 1rem; } }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; }
  .panel-title { font-family: var(--font-head); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
  .chart-wrap { position: relative; width: 100%; height: 220px; }
  .day-pills { display: flex; gap: 6px; margin-bottom: 1.25rem; }
  .pill { font-family: var(--font-head); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2); color: var(--muted); cursor: pointer; background: none; transition: all 0.15s; }
  .pill.active-push { border-color: var(--push); color: var(--push); }
  .pill.active-pull { border-color: var(--pull); color: var(--pull); }
  .pill.active-legs { border-color: var(--legs); color: var(--legs); }
  .pill.active-all { border-color: var(--accent); color: var(--accent); }
  select.styled { background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-family: var(--font-head); font-size: 11px; letter-spacing: 0.06em; padding: 6px 10px; border-radius: 4px; width: 100%; margin-bottom: 1rem; }
  select.styled option { background: var(--surface2); }
  .log-table { width: 100%; border-collapse: collapse; }
  .log-table th { font-family: var(--font-head); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0 8px 8px 0; border-bottom: 1px solid var(--border); }
  .log-table td { padding: 9px 8px 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); vertical-align: middle; }
  .log-table tr:last-child td { border-bottom: none; }
  .log-table .vol { color: var(--muted); font-family: var(--font-head); font-size: 11px; }
  .day-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .dot-push { background: var(--push); }
  .dot-pull { background: var(--pull); }
  .dot-legs { background: var(--legs); }
  .pr-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .pr-row:last-child { border-bottom: none; }
  .pr-name { font-size: 13px; color: var(--text); }
  .pr-val { font-family: var(--font-head); font-size: 13px; color: var(--accent); }
  .pr-sub { font-size: 11px; color: var(--muted); }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-family: var(--font-head); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  .loading { text-align: center; padding: 4rem; color: var(--muted); font-family: var(--font-head); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .error-box { background: var(--surface); border: 1px solid rgba(232,124,124,0.3); border-radius: 8px; padding: 2rem; margin: 1rem 0; }
  .error-box h3 { font-family: var(--font-head); font-size: 12px; color: #e87c7c; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }
  .error-box p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 0.75rem; }
  .error-box code { font-family: var(--font-head); font-size: 11px; background: var(--surface2); padding: 2px 6px; border-radius: 3px; color: var(--text); }
  .streak-bar { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 0.5rem; }
  .streak-day { width: 10px; height: 10px; border-radius: 2px; background: var(--surface2); }
  .streak-day.has-push { background: var(--push); }
  .streak-day.has-pull { background: var(--pull); }
  .streak-day.has-legs { background: var(--legs); }
  .script-url-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-family: var(--font-head); font-size: 11px; padding: 8px 10px; border-radius: 4px; margin-bottom: 8px; }
  .save-btn { font-family: var(--font-head); font-size: 11px; letter-spacing: 0.08em; color: var(--text); background: var(--surface2); border: 1px solid var(--border2); padding: 6px 16px; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
</style>
</head>
<body>
<header>
  <div class="logo">PPL <span>Tracker</span></div>
  <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
    <span class="last-sync" id="last-sync">—</span>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>
<div class="main" id="app">
  <div class="loading">Loading workout data...</div>
</div>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEeuzYxjx4EHAcyxHKZvbM_MW5RVgZZCIWvms8Ly6-fUMXvP6Xep85m3JXgHmnbRJW-Dcg0eSsjdmo/pub?gid=0&single=true&output=csv';
const C = { push: '#e8a87c', pull: '#7cc4e8', legs: '#a87ce8', accent: '#e8d87c' };
let allEntries = [];
let volumeChart = null, strengthChart = null, splitChart = null;
let activeFilter = 'all';
let selectedExercise = '';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const cols = []; let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
      else cur += c;
    }
    cols.push(cur);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (cols[i]||'').trim().replace(/"/g,''));
    return obj;
  }).filter(r => r.date && r.exercise);
}

async function loadData() {
  document.getElementById('last-sync').textContent = 'Syncing...';
  
  // Try direct fetch first (works when hosted on github pages)
  try {
    const res = await fetch(SHEET_CSV, { mode: 'cors' });
    if (res.ok) {
      const text = await res.text();
      const parsed = parseCSV(text);
      if (parsed.length >= 0) {
        processEntries(parsed);
        return;
      }
    }
  } catch(e) {}

  // Fallback: try corsproxy.io
  try {
    const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(SHEET_CSV));
    if (res.ok) {
      const text = await res.text();
      processEntries(parseCSV(text));
      return;
    }
  } catch(e) {}

  // All failed — show setup instructions
  showCORSError();
}

function processEntries(parsed) {
  allEntries = parsed.map(r => ({
    date: r.date, day: (r.day||'').toLowerCase().trim(),
    exercise: r.exercise, sets: parseInt(r.sets)||0,
    reps: parseInt(r.reps)||0, weight: parseFloat(r.weight)||0, notes: r.notes||''
  })).sort((a,b) => a.date.localeCompare(b.date));
  document.getElementById('last-sync').textContent = 'Synced ' + new Date().toLocaleTimeString();
  render();
}

function showCORSError() {
  document.getElementById('last-sync').textContent = 'Sync failed';
  document.getElementById('app').innerHTML = `
    <div class="error-box">
      <h3>Setup needed — one-time fix</h3>
      <p>The dashboard needs a Google Apps Script to fetch your sheet without browser restrictions. Takes 2 minutes:</p>
      <p><strong style="color:var(--text)">1.</strong> Open your Google Sheet → <strong style="color:var(--text)">Extensions → Apps Script</strong></p>
      <p><strong style="color:var(--text)">2.</strong> Delete any existing code and paste this:</p>
      <pre style="background:var(--surface2);padding:1rem;border-radius:4px;font-size:11px;color:var(--accent);overflow-x:auto;margin:0.5rem 0 0.75rem;line-height:1.6">function doGet() {
  var ss = SpreadsheetApp.openById('1Fl1ZwvmQbPvY8pOnpB4JRky7NyjZnU-x0QTRCuOgdfA');
  var sheet = ss.getSheets()[0];
  var data = sheet.getDataRange().getValues();
  var headers = data[0];
  var rows = data.slice(1).map(function(r) {
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = r[i]; });
    return obj;
  }).filter(function(r){ return r.Date; });
  return ContentService
    .createTextOutput(JSON.stringify(rows))
    .setMimeType(ContentService.MimeType.JSON);
}</pre>
      <p><strong style="color:var(--text)">3.</strong> Click <strong style="color:var(--text)">Deploy → New deployment</strong> → type: <code>Web app</code> → Execute as: <code>Me</code> → Who has access: <code>Anyone</code> → Deploy</p>
      <p><strong style="color:var(--text)">4.</strong> Copy the web app URL and paste it below:</p>
      <input class="script-url-input" id="script-url" placeholder="https://script.google.com/macros/s/.../exec" />
      <button class="save-btn" onclick="saveScriptUrl()">Save & load data</button>
    </div>`;
}

function saveScriptUrl() {
  const url = document.getElementById('script-url').value.trim();
  if (!url.startsWith('https://script.google.com')) { alert('Paste a valid Apps Script URL'); return; }
  localStorage.setItem('ppl_script_url', url);
  loadFromScript(url);
}

async function loadFromScript(url) {
  document.getElementById('last-sync').textContent = 'Syncing...';
  try {
    const res = await fetch(url);
    const json = await res.json();
    const entries = json.map(r => ({
      date: r.Date instanceof Date ? r.Date.toISOString().slice(0,10) : String(r.Date).slice(0,10),
      day: String(r.Day||'').toLowerCase().trim(),
      exercise: String(r.Exercise||''),
      sets: parseInt(r.Sets)||0, reps: parseInt(r.Reps)||0,
      weight: parseFloat(r.Weight)||0, notes: String(r.Notes||'')
    })).filter(r => r.date && r.exercise).sort((a,b) => a.date.localeCompare(b.date));
    allEntries = entries;
    document.getElementById('last-sync').textContent = 'Synced ' + new Date().toLocaleTimeString();
    render();
  } catch(e) {
    document.getElementById('last-sync').textContent = 'Script fetch failed';
    document.getElementById('app').innerHTML += '<p style="color:#e87c7c;font-family:var(--font-head);font-size:11px;padding:1rem">Could not reach script URL. Make sure access is set to "Anyone".</p>';
  }
}

function orm(w,r){ return Math.round(w*(1+r/30)); }
function vol(e){ return e.sets*e.reps*e.weight; }

function render() {
  if (!allEntries.length) {
    document.getElementById('app').innerHTML = '<div class="empty">No entries yet — log your first workout in Google Sheets</div>';
    return;
  }
  renderMetrics();
}

function renderMetrics() {
  const sessions = [...new Set(allEntries.map(e=>e.date))];
  const totalVol = allEntries.reduce((a,e)=>a+vol(e),0);
  const pushS = [...new Set(allEntries.filter(e=>e.day==='push').map(e=>e.date))].length;
  const pullS = [...new Set(allEntries.filter(e=>e.day==='pull').map(e=>e.date))].length;
  const legsS = [...new Set(allEntries.filter(e=>e.day==='legs').map(e=>e.date))].length;
  const exercises = new Set(allEntries.map(e=>e.exercise)).size;
  let streak=0; const dSet=new Set(sessions); const today=new Date();
  for(let i=0;i<60;i++){ const d=new Date(today); d.setDate(d.getDate()-i); const ds=d.toISOString().slice(0,10); if(dSet.has(ds)) streak++; else if(i>0) break; }
  const dayMap={};
  allEntries.forEach(e=>{ if(!dayMap[e.date]) dayMap[e.date]=new Set(); dayMap[e.date].add(e.day); });
  let heatHtml='';
  for(let i=59;i>=0;i--){ const d=new Date(today); d.setDate(d.getDate()-i); const ds=d.toISOString().slice(0,10); const days=dayMap[ds]; let cls='streak-day'; if(days){ if(days.size>1) cls+=' has-push has-pull'; else if(days.has('push')) cls+=' has-push'; else if(days.has('pull')) cls+=' has-pull'; else if(days.has('legs')) cls+=' has-legs'; } heatHtml+=`<div class="${cls}" title="${ds}"></div>`; }
  const volStr = totalVol>=1000000?(totalVol/1000000).toFixed(1)+'M':totalVol>=1000?Math.round(totalVol/1000)+'k':totalVol;

  document.getElementById('app').innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Sessions</div><div class="metric-value">${sessions.length}</div><div class="metric-sub">Push ${pushS} · Pull ${pullS} · Legs ${legsS}</div></div>
      <div class="metric"><div class="metric-label">Total volume</div><div class="metric-value">${volStr}</div><div class="metric-sub">lb lifted</div></div>
      <div class="metric"><div class="metric-label">Exercises</div><div class="metric-value">${exercises}</div><div class="metric-sub">unique lifts</div></div>
      <div class="metric"><div class="metric-label">Streak</div><div class="metric-value">${streak}</div><div class="metric-sub">consecutive days</div></div>
      <div class="metric" style="grid-column:1/-1"><div class="metric-label" style="margin-bottom:0.75rem">Last 60 days</div><div class="streak-bar">${heatHtml}</div><div style="display:flex;gap:1rem;margin-top:8px;font-size:11px;color:var(--muted)"><span style="color:var(--push)">● Push</span><span style="color:var(--pull)">● Pull</span><span style="color:var(--legs)">● Legs</span></div></div>
    </div>
    <div class="grid2">
      <div class="panel">
        <div class="panel-title">Volume per session</div>
        <div class="day-pills">
          <button class="pill active-all" onclick="setFilter('all',this)">All</button>
          <button class="pill" onclick="setFilter('push',this)">Push</button>
          <button class="pill" onclick="setFilter('pull',this)">Pull</button>
          <button class="pill" onclick="setFilter('legs',this)">Legs</button>
        </div>
        <div class="chart-wrap"><canvas id="volumeChart" role="img" aria-label="Volume per session"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-title">Split balance</div>
        <div class="chart-wrap"><canvas id="splitChart" role="img" aria-label="Push pull legs split"></canvas></div>
      </div>
    </div>
    <div class="panel" style="margin-bottom:1.5rem">
      <div class="panel-title">Strength progress — estimated 1RM</div>
      <select class="styled" id="ex-select" onchange="setExercise(this.value)"></select>
      <div class="chart-wrap"><canvas id="strengthChart" role="img" aria-label="Estimated 1RM over time"></canvas></div>
    </div>
    <div class="grid2">
      <div class="panel"><div class="panel-title">Personal records</div><div id="pr-list"></div></div>
      <div class="panel"><div class="panel-title">Recent log</div><div id="log-list"></div></div>
    </div>`;

  renderVolumeChart(); renderSplitChart(); populateExSelect(); renderPRs(); renderLog();
}

function setFilter(f,btn){ activeFilter=f; document.querySelectorAll('.pill').forEach(p=>{p.className='pill';}); btn.className='pill active-'+f; renderVolumeChart(); }
function setExercise(v){ selectedExercise=v; renderStrengthChart(); }

function renderVolumeChart(){
  const filtered=activeFilter==='all'?allEntries:allEntries.filter(e=>e.day===activeFilter);
  const byDate={}; filtered.forEach(e=>{byDate[e.date]=(byDate[e.date]||0)+vol(e);});
  const dates=Object.keys(byDate).sort().slice(-20);
  const vals=dates.map(d=>Math.round(byDate[d]));
  const color=activeFilter==='push'?C.push:activeFilter==='pull'?C.pull:activeFilter==='legs'?C.legs:C.accent;
  const labels=dates.map(d=>{const dt=new Date(d+'T12:00:00');return(dt.getMonth()+1)+'/'+(dt.getDate());});
  if(volumeChart) volumeChart.destroy();
  const ctx=document.getElementById('volumeChart'); if(!ctx) return;
  volumeChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:color+'99',borderColor:color,borderWidth:1,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7a7a82',font:{family:'DM Mono',size:10},autoSkip:true,maxRotation:45},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'#7a7a82',font:{family:'DM Mono',size:10},callback:v=>v>=1000?Math.round(v/1000)+'k':v},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}

function renderSplitChart(){
  const push=[...new Set(allEntries.filter(e=>e.day==='push').map(e=>e.date))].length;
  const pull=[...new Set(allEntries.filter(e=>e.day==='pull').map(e=>e.date))].length;
  const legs=[...new Set(allEntries.filter(e=>e.day==='legs').map(e=>e.date))].length;
  if(splitChart) splitChart.destroy();
  const ctx=document.getElementById('splitChart'); if(!ctx) return;
  splitChart=new Chart(ctx,{type:'doughnut',data:{labels:['Push','Pull','Legs'],datasets:[{data:[push,pull,legs],backgroundColor:[C.push+'cc',C.pull+'cc',C.legs+'cc'],borderColor:'#161618',borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{position:'bottom',labels:{color:'#7a7a82',font:{family:'DM Mono',size:10},boxWidth:8,padding:12}}}}});
}

function populateExSelect(){
  const sel=document.getElementById('ex-select'); if(!sel) return;
  const names=[...new Set(allEntries.map(e=>e.exercise))].sort();
  sel.innerHTML='<option value="">— select an exercise —</option>'+names.map(n=>`<option value="${n}">${n}</option>`).join('');
  if(selectedExercise){sel.value=selectedExercise;renderStrengthChart();}
}

function renderStrengthChart(){
  const sel=document.getElementById('ex-select');
  const ex=sel?sel.value:selectedExercise;
  if(strengthChart) strengthChart.destroy();
  const ctx=document.getElementById('strengthChart'); if(!ctx||!ex) return;
  const exE=allEntries.filter(e=>e.exercise===ex);
  const byDate={}; exE.forEach(e=>{const o=orm(e.weight,e.reps);if(!byDate[e.date]||o>byDate[e.date])byDate[e.date]=o;});
  const dates=Object.keys(byDate).sort(); const vals=dates.map(d=>byDate[d]);
  const labels=dates.map(d=>{const dt=new Date(d+'T12:00:00');return(dt.getMonth()+1)+'/'+(dt.getDate());});
  const day=allEntries.find(e=>e.exercise===ex)?.day;
  const color=day==='push'?C.push:day==='pull'?C.pull:day==='legs'?C.legs:C.accent;
  strengthChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:vals,borderColor:color,backgroundColor:color+'18',tension:0.35,pointRadius:4,pointBackgroundColor:color,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#7a7a82',font:{family:'DM Mono',size:10},autoSkip:true,maxRotation:45},grid:{color:'rgba(255,255,255,0.04)'}},y:{beginAtZero:false,ticks:{color:'#7a7a82',font:{family:'DM Mono',size:10},callback:v=>v+' lb'},grid:{color:'rgba(255,255,255,0.04)'}}}}});
}

function renderPRs(){
  const el=document.getElementById('pr-list'); if(!el) return;
  const prs={};
  allEntries.forEach(e=>{const o=orm(e.weight,e.reps);if(!prs[e.exercise]||o>prs[e.exercise].orm)prs[e.exercise]={orm:o,weight:e.weight,reps:e.reps,date:e.date,day:e.day};});
  const sorted=Object.entries(prs).sort((a,b)=>b[1].orm-a[1].orm).slice(0,10);
  if(!sorted.length){el.innerHTML='<div class="empty">No data yet</div>';return;}
  el.innerHTML=sorted.map(([name,p])=>{const dotCls=p.day==='push'?'dot-push':p.day==='pull'?'dot-pull':'dot-legs';return`<div class="pr-row"><div><div class="pr-name"><span class="day-dot ${dotCls}"></span>${name}</div><div class="pr-sub">${p.weight}lb × ${p.reps} · ${p.date}</div></div><div class="pr-val">${p.orm} lb</div></div>`;}).join('');
}

function renderLog(){
  const el=document.getElementById('log-list'); if(!el) return;
  const recent=[...allEntries].reverse().slice(0,15);
  if(!recent.length){el.innerHTML='<div class="empty">No entries yet</div>';return;}
  el.innerHTML=`<table class="log-table"><thead><tr><th>Exercise</th><th>Sets</th><th>Reps</th><th>Wt</th><th>Vol</th></tr></thead><tbody>`+recent.map(e=>{const dotCls=e.day==='push'?'dot-push':e.day==='pull'?'dot-pull':'dot-legs';return`<tr><td><span class="day-dot ${dotCls}"></span>${e.exercise}<div style="font-size:10px;color:var(--muted);font-family:'DM Mono'">${e.date}</div></td><td>${e.sets}</td><td>${e.reps}</td><td>${e.weight}</td><td class="vol">${Math.round(vol(e)).toLocaleString()}</td></tr>`;}).join('')+'</tbody></table>';
}

// Check for saved script URL first
const savedUrl = localStorage.getItem('ppl_script_url');
if (savedUrl) {
  loadFromScript(savedUrl);
} else {
  loadData();
}
</script>
</body>
</html>
